<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publikationen | Dr. Valentin Katter</title>
    <link rel="icon" type="image/svg+xml" href="favicon-zeta.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Startseite</a></li>
            <li><a href="projects.html">Projekte</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="section alt">
        <div class="container">
          <h1>Publikationen</h1>
          <p>Chronologisch sortiert (neueste zuerst). Für jede Publikation gibt es eine Detailseite.</p>
          <div id="publication-listing" class="publication-groups"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>© <span id="year"></span> Dr. Valentin Katter</small>
      </div>
    </footer>

    <script src="publications-data.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
      const grouped = (window.PUBLICATIONS || []).reduce((acc, item) => {
        acc[item.year] = acc[item.year] || [];
        acc[item.year].push(item);
        return acc;
      }, {});

      const years = Object.keys(grouped)
        .map(Number)
        .sort((a, b) => b - a);

      const container = document.getElementById("publication-listing");
      years.forEach((year) => {
        const section = document.createElement("section");
        section.className = "publication-year";
        section.innerHTML = `<h2>${year}</h2>`;

        grouped[year].forEach((pub) => {
          const item = document.createElement("article");
          item.className = "publication-item";
          item.innerHTML = `
            <p class="publication-authors">${pub.authors} (${pub.month})</p>
            <h3 class="publication-title">
              <a href="publication-detail.html?id=${encodeURIComponent(pub.id)}">${pub.title}</a>
            </h3>
            <p class="publication-meta">${pub.type}: ${pub.venue}</p>
          `;
          section.appendChild(item);
        });

        container.appendChild(section);
      });
    </script>
  </body>
</html>
